name: Android Public SDK CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly public SDK check at 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: leona-sdk-android

jobs:
  lint-and-test:
    name: Lint + Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Run Android lint
        run: ./gradlew :sdk:lint --no-daemon

      - name: Run unit tests
        run: ./gradlew :sdk:testDebugUnitTest --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: leona-sdk-android/sdk/build/reports/tests/
          retention-days: 7

  assemble:
    name: Assemble AAR (debug + release)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK r26d
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Assemble debug
        run: ./gradlew :sdk:assembleDebug --no-daemon

      - name: Assemble release
        run: ./gradlew :sdk:assembleRelease --no-daemon

      - name: Upload AAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leona-sdk-aars
          path: leona-sdk-android/sdk/build/outputs/aar/*.aar
          retention-days: 30

  native-sanity:
    name: Native source sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy / clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format

      - name: clang-format advisory
        continue-on-error: true
        run: |
          find sdk/src/main/cpp -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --style=Google

  publish-release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: [lint-and-test, assemble]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK r26d
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Build release AAR
        run: ./gradlew :sdk:assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            leona-sdk-android/sdk/build/outputs/aar/sdk-release.aar
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
