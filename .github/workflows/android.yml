name: Android CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_alpha_closure:
        description: "Run one-shot alpha closure (build gate + local demo-backend + cloud-config smoke)"
        required: false
        type: boolean
        default: false
      run_live_e2e:
        description: "Run sample-app emulator E2E against externally hosted Leona endpoints"
        required: false
        type: boolean
        default: false
      run_live_attestation_e2e:
        description: "Run attestation-summary emulator E2E against externally hosted Leona endpoints"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: leona-sdk-android

jobs:
  lint-and-test:
    name: Lint + Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Run Kotlin lint
        run: ./gradlew :sdk:lint --no-daemon

      - name: Run unit tests
        run: ./gradlew :sdk:testDebugUnitTest --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: leona-sdk-android/sdk/build/reports/tests/
          retention-days: 7

  assemble:
    name: Assemble AAR (debug + release)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK r26d
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Assemble debug
        run: ./gradlew :sdk:assembleDebug --no-daemon

      - name: Assemble release
        run: ./gradlew :sdk:assembleRelease --no-daemon

      - name: Upload AAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leona-sdk-aars
          path: leona-sdk-android/sdk/build/outputs/aar/*.aar
          retention-days: 30

  native-sanity:
    name: Native source sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy / clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-format

      - name: clang-format check
        run: |
          find sdk/src/main/cpp -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror --style=Google

  alpha-closure:
    name: Alpha closure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_alpha_closure
    timeout-minutes: 45
    env:
      OUTPUT_DIR: ${{ runner.temp }}/leona-alpha-closure

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK r26d
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Run alpha closure
        run: |
          mkdir -p "$OUTPUT_DIR"
          bash ./scripts/run-alpha-closure.sh

      - name: Summarize alpha closure
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = Path("${{ runner.temp }}/leona-alpha-closure/report.json")
          print("## Alpha closure")
          if not report.exists():
              print("")
              print("report.json missing")
              raise SystemExit(0)

          data = json.loads(report.read_text(encoding="utf-8"))
          print("")
          print(f"- buildGate: `{data.get('buildGate')}`")
          print(f"- cloudConfigSmoke: `{data.get('cloudConfigSmoke')}`")
          att = data.get("attestationE2E") or {}
          print(f"- attestationE2E requested: `{att.get('requested')}`")
          print(f"- attestationE2E passed: `{att.get('passed')}`")
          emu = data.get("emulatorE2E") or {}
          print(f"- emulatorE2E requested: `{emu.get('requested')}`")
          print(f"- emulatorE2E passed: `{emu.get('passed')}`")
          formal = emu.get("formalVerdict") or {}
          if formal:
              print(f"- emulatorE2E formalBoxId: `{formal.get('formalBoxId')}`")
              print(f"- emulatorE2E formalCanonical: `{formal.get('formalCanonical') or formal.get('canonical')}`")
              print(f"- emulatorE2E formalRisk: `{formal.get('formalRiskLevel')}/{formal.get('formalRiskScore')}`")
              print(f"- emulatorE2E formalSignatureVerified: `{formal.get('formalSignatureVerified')}`")
          dev = data.get("deviceE2E") or {}
          print(f"- deviceE2E requested: `{dev.get('requested')}`")
          print(f"- deviceE2E passed: `{dev.get('passed')}`")
          PY

      - name: Upload alpha closure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-closure-artifacts
          path: ${{ runner.temp }}/leona-alpha-closure
          retention-days: 14

  live-emulator-e2e:
    name: Live emulator E2E
    runs-on: ubuntu-latest
    needs: [lint-and-test, assemble]
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_e2e
    timeout-minutes: 60
    env:
      LEONA_API_KEY: ${{ secrets.LEONA_E2E_API_KEY }}
      LEONA_SERVER_SECRET_KEY: ${{ secrets.LEONA_E2E_SECRET_KEY }}
      LEONA_REPORTING_ENDPOINT: ${{ vars.LEONA_E2E_REPORTING_ENDPOINT }}
      LEONA_FORMAL_VERDICT_BASE_URL: ${{ vars.LEONA_E2E_FORMAL_VERDICT_BASE_URL }}
      LEONA_CLOUD_CONFIG_ENDPOINT: ${{ vars.LEONA_E2E_CLOUD_CONFIG_ENDPOINT }}
      LEONA_DEMO_BACKEND_BASE_URL: ${{ vars.LEONA_E2E_DEMO_BACKEND_BASE_URL }}
      OUTPUT_DIR: ${{ runner.temp }}/leona-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Validate required E2E settings
        run: |
          test -n "$LEONA_API_KEY" || { echo "Missing secret LEONA_E2E_API_KEY"; exit 1; }
          test -n "$LEONA_SERVER_SECRET_KEY" || { echo "Missing secret LEONA_E2E_SECRET_KEY"; exit 1; }
          test -n "$LEONA_REPORTING_ENDPOINT" || { echo "Missing repo variable LEONA_E2E_REPORTING_ENDPOINT"; exit 1; }
          test -n "$LEONA_FORMAL_VERDICT_BASE_URL" || { echo "Missing repo variable LEONA_E2E_FORMAL_VERDICT_BASE_URL"; exit 1; }
          test -n "$LEONA_CLOUD_CONFIG_ENDPOINT" || { echo "Missing repo variable LEONA_E2E_CLOUD_CONFIG_ENDPOINT"; exit 1; }
          test -n "$LEONA_DEMO_BACKEND_BASE_URL" || { echo "Missing repo variable LEONA_E2E_DEMO_BACKEND_BASE_URL"; exit 1; }

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK and emulator dependencies
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            "platform-tools" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Run emulator E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd leona-sdk-android
            export LEONA_API_KEY="$LEONA_API_KEY"
            export LEONA_SERVER_SECRET_KEY="$LEONA_SERVER_SECRET_KEY"
            export LEONA_REPORTING_ENDPOINT="$LEONA_REPORTING_ENDPOINT"
            export LEONA_FORMAL_VERDICT_BASE_URL="$LEONA_FORMAL_VERDICT_BASE_URL"
            export LEONA_CLOUD_CONFIG_ENDPOINT="$LEONA_CLOUD_CONFIG_ENDPOINT"
            export LEONA_DEMO_BACKEND_BASE_URL="$LEONA_DEMO_BACKEND_BASE_URL"
            export OUTPUT_DIR="$OUTPUT_DIR"
            export GRADLE_USER_HOME="$GITHUB_WORKSPACE/.gradle-home"
            mkdir -p "$OUTPUT_DIR"
            bash ./scripts/run-emulator-e2e.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-e2e-artifacts
          path: ${{ runner.temp }}/leona-e2e
          retention-days: 14

  live-attestation-e2e:
    name: Live attestation summary E2E
    runs-on: ubuntu-latest
    needs: [lint-and-test, assemble]
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_attestation_e2e
    timeout-minutes: 60
    env:
      LEONA_API_KEY: ${{ secrets.LEONA_E2E_API_KEY }}
      LEONA_HOST_BASE_URL: ${{ vars.LEONA_E2E_HOST_BASE_URL }}
      LEONA_REPORTING_ENDPOINT: ${{ vars.LEONA_E2E_REPORTING_ENDPOINT }}
      LEONA_SAMPLE_ATTESTATION_MODE: ${{ vars.LEONA_E2E_ATTESTATION_MODE }}
      LEONA_SAMPLE_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER: ${{ vars.LEONA_E2E_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER }}
      OUTPUT_DIR: ${{ runner.temp }}/leona-attestation-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Validate required attestation E2E settings
        run: |
          test -n "$LEONA_API_KEY" || { echo "Missing secret LEONA_E2E_API_KEY"; exit 1; }
          test -n "$LEONA_HOST_BASE_URL" || { echo "Missing repo variable LEONA_E2E_HOST_BASE_URL"; exit 1; }
          test -n "$LEONA_REPORTING_ENDPOINT" || { echo "Missing repo variable LEONA_E2E_REPORTING_ENDPOINT"; exit 1; }
          if [[ -z "${LEONA_SAMPLE_ATTESTATION_MODE:-}" ]]; then
            echo "LEONA_SAMPLE_ATTESTATION_MODE not set, defaulting to debug_fake"
            echo "LEONA_SAMPLE_ATTESTATION_MODE=debug_fake" >> "$GITHUB_ENV"
          fi
          if [[ -z "${LEONA_SAMPLE_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER:-}" ]]; then
            echo "LEONA_SAMPLE_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER=1234567890123" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK and emulator dependencies
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264" \
            "platform-tools" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

      - name: Run attestation summary E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd leona-sdk-android
            export LEONA_API_KEY="$LEONA_API_KEY"
            export LEONA_HOST_BASE_URL="$LEONA_HOST_BASE_URL"
            export LEONA_REPORTING_ENDPOINT="$LEONA_REPORTING_ENDPOINT"
            export LEONA_SAMPLE_ATTESTATION_MODE="${LEONA_SAMPLE_ATTESTATION_MODE:-debug_fake}"
            export LEONA_SAMPLE_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER="${LEONA_SAMPLE_PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER:-1234567890123}"
            export LEONA_CLOUD_CONFIG_ENDPOINT=""
            export LEONA_DEMO_BACKEND_BASE_URL=""
            export OUTPUT_DIR="$OUTPUT_DIR"
            export GRADLE_USER_HOME="$GITHUB_WORKSPACE/.gradle-home"
            mkdir -p "$OUTPUT_DIR"
            bash ./scripts/run-emulator-attestation-e2e.sh

      - name: Summarize attestation E2E
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = Path("${{ runner.temp }}/leona-attestation-e2e/attestation-e2e-report.json")
          print("## Live attestation summary E2E")
          if not report.exists():
              print("")
              print("attestation-e2e-report.json missing")
              raise SystemExit(0)

          data = json.loads(report.read_text(encoding="utf-8"))
          server = data.get("serverHandshake") or {}
          att = (server.get("attestation") or {})
          checks = data.get("checks") or {}
          print("")
          print(f"- mode: `{data.get('attestationMode')}`")
          print(f"- boxId: `{data.get('boxId')}`")
          print(f"- deviceBindingStatus: `{server.get('deviceBindingStatus')}`")
          print(f"- provider: `{att.get('provider')}`")
          print(f"- status: `{att.get('status')}`")
          print(f"- code: `{att.get('code')}`")
          print(f"- retryable: `{att.get('retryable')}`")
          print("")
          print("### Surface checks")
          print("")
          print(f"- transportBindingStatus: `{checks.get('transportBindingStatus')}`")
          print(f"- supportBundleBindingStatus: `{checks.get('supportBundleBindingStatus')}`")
          print(f"- transportServerAttestation: `{checks.get('transportServerAttestation')}`")
          print(f"- supportBundleServerAttestation: `{checks.get('supportBundleServerAttestation')}`")
          PY

      - name: Upload attestation E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attestation-e2e-artifacts
          path: ${{ runner.temp }}/leona-attestation-e2e
          retention-days: 14

  publish-release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: [lint-and-test, assemble]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

      - name: Install NDK r26d
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.3.11579264"

      - name: Build release AAR
        run: ./gradlew :sdk:assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            leona-sdk-android/sdk/build/outputs/aar/sdk-release.aar
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
