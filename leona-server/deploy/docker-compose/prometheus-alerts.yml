groups:
  - name: leona-platform
    rules:
      - alert: LeonaServiceDown
        expr: up{job=~"gateway|ingestion-service|query-service|admin-service|worker-event-persister"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Leona service down"
          description: "{{ $labels.job }} has been unreachable for more than 2 minutes."

      - alert: LeonaWorkerDlqPublished
        expr: increase(leona_worker_dlq_published_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Leona worker DLQ activity detected"
          description: "worker-event-persister published at least one event into DLQ during the last 5 minutes."

      - alert: LeonaIngestion5xx
        expr: increase(http_server_requests_seconds_count{service="ingestion-service",uri="/v1/sense",status=~"5.."}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Leona ingestion /v1/sense has 5xx responses"
          description: "ingestion-service returned at least one 5xx for /v1/sense during the last 5 minutes."

      - alert: LeonaQuery5xx
        expr: increase(http_server_requests_seconds_count{service="query-service",uri="/v1/verdict",status=~"5.."}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Leona query /v1/verdict has 5xx responses"
          description: "query-service returned at least one 5xx for /v1/verdict during the last 5 minutes."
