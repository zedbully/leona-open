# Local development stack for Leona Server.
#
# Brings up:
#   - PostgreSQL 16 (OLTP)
#   - Redis 7 (session keys, BoxId hot store, replay nonces, rate limit)
#   - Kafka (KRaft mode, no ZK) + Kafdrop UI on :9000
#   - All four Leona services plus the gateway
#   - Prometheus + Grafana for observability dashboards
#
# Usage:
#   docker compose up -d
#   open http://localhost:9000    # Kafdrop
#   open http://localhost:3000    # Grafana (admin / admin)
#   curl http://localhost:8080/v1/health
#
# Clean up:
#   docker compose down -v

services:

  postgres:
    image: postgres:16-alpine
    container_name: leona-postgres
    environment:
      POSTGRES_DB: leona
      POSTGRES_USER: leona
      POSTGRES_PASSWORD: leona
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leona"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: leona-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: leona-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: LeonaDevelopmentCluster

  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.1
    container_name: leona-kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092

  gateway:
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    container_name: leona-gateway
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: -XX:+UseG1GC -Xms64m -Xmx256m
      REDIS_HOST: redis
      LEONA_REGION: local

  ingestion-service:
    build:
      context: ../..
      dockerfile: ingestion-service/Dockerfile
    container_name: leona-ingestion
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: -XX:+UseG1GC -Xms64m -Xmx256m
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LEONA_REGION: local
      # Local/demo-only mainland attestation provider used by sample
      # oem_debug_fake E2E. Production must replace this with real OEM
      # provider keys / verifier policy.
      LEONA_HANDSHAKE_ATTESTATION_OEM_TRUSTED_PROVIDERS: sample_mainland_debug

  query-service:
    build:
      context: ../..
      dockerfile: query-service/Dockerfile
    container_name: leona-query
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: -XX:+UseG1GC -Xms64m -Xmx256m
      POSTGRES_HOST: postgres
      POSTGRES_DB: leona
      POSTGRES_USER: leona
      POSTGRES_PASSWORD: leona
      REDIS_HOST: redis
      LEONA_REGION: local

  admin-service:
    build:
      context: ../..
      dockerfile: admin-service/Dockerfile
    container_name: leona-admin
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: -XX:+UseG1GC -Xms64m -Xmx256m
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_HOST: postgres
      POSTGRES_DB: leona
      POSTGRES_USER: leona
      POSTGRES_PASSWORD: leona
      REDIS_HOST: redis
      LEONA_REGION: local

  worker-event-persister:
    build:
      context: ../..
      dockerfile: worker-event-persister/Dockerfile
    container_name: leona-worker
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JAVA_OPTS: -XX:+UseG1GC -Xms64m -Xmx256m
      POSTGRES_HOST: postgres
      POSTGRES_DB: leona
      POSTGRES_USER: leona
      POSTGRES_PASSWORD: leona
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LEONA_REGION: local

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: leona-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h

  grafana:
    image: grafana/grafana:11.3.0
    container_name: leona-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro

volumes:
  postgres-data:
  grafana-data:
