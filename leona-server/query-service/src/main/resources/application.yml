spring:
  application:
    name: query-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:leona}
    username: ${POSTGRES_USER:leona}
    password: ${POSTGRES_PASSWORD:leona}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 3000
      leak-detection-threshold: 10000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 1s
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      service: query-service
      region: ${LEONA_REGION:local}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        slidingWindowSize: 50
        failureRateThreshold: 50
      postgres:
        slidingWindowSize: 50
        failureRateThreshold: 40

logging:
  level:
    root: INFO
    io.leonasec: DEBUG
